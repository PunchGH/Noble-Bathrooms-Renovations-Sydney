document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

236,.72);max-width:440px\">Send us the basics and we'll come back within one business day with next steps and a clear, itemized quote. Free, and no obligation.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <div style=\"display:flex;align-items:center;gap:14px\"><div style=\"width:8px;height:8px;background:#ff5a24\"><\u002Fdiv><span style=\"font-size:16px;color:#f5f2ec\">Response within 1 business day<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px\"><div style=\"width:8px;height:8px;background:#ff5a24\"><\u002Fdiv><span style=\"font-size:16px;color:#f5f2ec\">No pushy sales calls, ever<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px\"><div style=\"width:8px;height:8px;background:#ff5a24\"><\u002Fdiv><span style=\"font-size:16px;color:#f5f2ec\">Fixed, itemized pricing up front<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n    <form sc-camel-on-submit=\"{{ submit }}\" style=\"background:#ffffff;border:1px solid rgba(28,26,22,.12);padding:36px 34px\">\n      <div style=\"margin-bottom:20px\">\n        <label style=\"display:block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:rgba(28,26,22,.6);margin-bottom:8px\">FULL NAME<\u002Flabel>\n        <input value=\"{{ name }}\" sc-camel-on-input=\"{{ setName }}\" placeholder=\"Jane Builder\" style=\"width:100%;background:#efeae0;border:1px solid rgba(28,26,22,.2);color:#16130d;font-size:16px;padding:14px 16px;outline:none;transition:border-color .2s, background .2s\" style-focus=\"border-color:#ff5a24;background:#ffffff\">\n      <\u002Fdiv>\n      <div style=\"margin-bottom:20px\">\n        <label style=\"display:block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:rgba(28,26,22,.6);margin-bottom:8px\">EMAIL<\u002Flabel>\n        <input value=\"{{ email }}\" sc-camel-on-input=\"{{ setEmail }}\" type=\"email\" placeholder=\"you@email.com\" style=\"width:100%;background:#efeae0;border:1px solid rgba(28,26,22,.2);color:#16130d;font-size:16px;padding:14px 16px;outline:none;transition:border-color .2s, background .2s\" style-focus=\"border-color:#ff5a24;background:#ffffff\">\n      <\u002Fdiv>\n      <div style=\"margin-bottom:20px\">\n        <label style=\"display:block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:rgba(28,26,22,.6);margin-bottom:8px\">PROJECT TYPE<\u002Flabel>\n        <div style=\"position:relative\"><sc-raw-select value=\"{{ ptype }}\" sc-camel-on-change=\"{{ setPtype }}\" style=\"-webkit-appearance:none;appearance:none;width:100%;background:#efeae0;border:1px solid rgba(28,26,22,.2);color:#16130d;font-size:16px;padding:14px 16px;outline:none;transition:border-color .2s, background .2s\" style-focus=\"border-color:#ff5a24;background:#ffffff\">\n          <option value=\"\">Select one…<\u002Foption>\n          <option value=\"new-build\">New home build<\u002Foption>\n          <option value=\"renovation\">Renovation / remodel<\u002Foption>\n          <option value=\"commercial\">Commercial construction<\u002Foption>\n          <option value=\"general\">General contracting<\u002Foption>\n          <option value=\"unsure\">Not sure yet<\u002Foption>\n        <\u002Fsc-raw-select><span style=\"position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:none;color:#ff5a24;font-size:12px\">▼<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:26px\">\n        <label style=\"display:block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:rgba(28,26,22,.6);margin-bottom:8px\">TELL US ABOUT YOUR PROJECT<\u002Flabel>\n        <textarea value=\"{{ msg }}\" sc-camel-on-input=\"{{ setMsg }}\" rows=\"4\" placeholder=\"A few lines on what you're planning, timeline, location…\" style=\"width:100%;background:#efeae0;border:1px solid rgba(28,26,22,.2);color:#16130d;font-size:16px;padding:14px 16px;outline:none;resize:vertical;transition:border-color .2s, background .2s\" style-focus=\"border-color:#ff5a24;background:#ffffff\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin:0 0 16px;padding:12px 14px;border:1px solid #d43d0f;background:rgba(255,90,36,.08);color:#d43d0f;font-size:14px;font-weight:600\">{{ formError }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <button type=\"submit\" style=\"width:100%;cursor:pointer;background:#ff5a24;color:#16130d;border:none;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:19px;padding:18px;transition:background .2s\" style-hover=\"background:#e64a17\">Get my free quote →<\u002Fbutton>\n      <p style=\"margin:16px 0 0;text-align:center;font-size:12px;color:rgba(28,26,22,.45)\">We'll only use your details to prepare your quote.<\u002Fp>\n    <\u002Fform>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#ffffff;border:1px solid #ff5a24;padding:56px 40px;text-align:center;min-height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n      <div style=\"width:60px;height:60px;background:#ff5a24;color:#16130d;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;margin-bottom:24px\">✓<\u002Fdiv>\n      <h3 style=\"margin:0 0 12px;font-family:'Oswald',sans-serif;font-weight:700;font-size:34px;text-transform:uppercase\">Quote request received<\u002Fh3>\n      <p style=\"margin:0;font-size:17px;line-height:1.6;color:rgba(28,26,22,.72);max-width:360px\">Thanks — we've got it. A project lead will reach out within one business day. Keep an eye on your inbox.<\u002Fp>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= FAQ / OBJECTION HANDLING ================= -->\n<section style=\"background:#f6f3ec;padding:96px 60px\">\n  <div style=\"max-width:860px;margin:0 auto\">\n    <div style=\"text-align:center;margin-bottom:48px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;color:#ff5a24;margin-bottom:16px\">08 — BEFORE YOU ASK<\u002Fdiv>\n      <h2 style=\"margin:0;font-family:'Oswald',sans-serif;font-weight:700;font-size:52px;line-height:.98;text-transform:uppercase\">Questions, answered straight<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"border-top:1px solid rgba(28,26,22,.14)\">\n      <div sc-camel-on-click=\"{{ tf0 }}\" style=\"cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:24px 4px;border-bottom:1px solid rgba(28,26,22,.14);transition:background .2s\" style-hover=\"background:rgba(255,90,36,.07)\"><span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;text-transform:uppercase\">How much will my project cost?<\u002Fspan><span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;color:#ff5a24\">{{ sign0 }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:{{ open0 }};padding:6px 4px 24px;border-bottom:1px solid rgba(28,26,22,.14)\"><p style=\"margin:0;font-size:16px;line-height:1.65;color:rgba(28,26,22,.72);max-width:640px\">It depends on scope, but you'll never be surprised. After a free site visit we send a fixed, itemized quote — and that's the price you pay. Most homeowners are surprised how transparent it is.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div sc-camel-on-click=\"{{ tf1 }}\" style=\"cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:24px 4px;border-bottom:1px solid rgba(28,26,22,.14);transition:background .2s\" style-hover=\"background:rgba(255,90,36,.07)\"><span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;text-transform:uppercase\">How long does a build take?<\u002Fspan><span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;color:#ff5a24\">{{ sign1 }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:{{ open1 }};padding:6px 4px 24px;border-bottom:1px solid rgba(28,26,22,.14)\"><p style=\"margin:0;font-size:16px;line-height:1.65;color:rgba(28,26,22,.72);max-width:640px\">A kitchen remodel runs 4–8 weeks; a full custom home 6–12 months. We give you a realistic schedule up front and hit it — 100% on-time record across 540+ projects.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div sc-camel-on-click=\"{{ tf2 }}\" style=\"cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:24px 4px;border-bottom:1px solid rgba(28,26,22,.14);transition:background .2s\" style-hover=\"background:rgba(255,90,36,.07)\"><span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;text-transform:uppercase\">Are you licensed and insured?<\u002Fspan><span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;color:#ff5a24\">{{ sign2 }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:{{ open2 }};padding:6px 4px 24px;border-bottom:1px solid rgba(28,26,22,.14)\"><p style=\"margin:0;font-size:16px;line-height:1.65;color:rgba(28,26,22,.72);max-width:640px\">Fully. We're licensed (#CB-408817), bonded, and carry general liability plus workers' comp. EPA certified and OSHA compliant. We'll share certificates before any work begins.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div sc-camel-on-click=\"{{ tf3 }}\" style=\"cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:24px 4px;border-bottom:1px solid rgba(28,26,22,.14);transition:background .2s\" style-hover=\"background:rgba(255,90,36,.07)\"><span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;text-transform:uppercase\">Do you handle permits?<\u002Fspan><span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;color:#ff5a24\">{{ sign3 }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:{{ open3 }};padding:6px 4px 24px;border-bottom:1px solid rgba(28,26,22,.14)\"><p style=\"margin:0;font-size:16px;line-height:1.65;color:rgba(28,26,22,.72);max-width:640px\">Yes — we manage all drawings, permit applications and inspections in-house. You don't chase paperwork or city offices; that's our job.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div sc-camel-on-click=\"{{ tf4 }}\" style=\"cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:24px 4px;border-bottom:1px solid rgba(28,26,22,.14);transition:background .2s\" style-hover=\"background:rgba(255,90,36,.07)\"><span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;text-transform:uppercase\">What if it goes over budget?<\u002Fspan><span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;color:#ff5a24\">{{ sign4 }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:{{ open4 }};padding:6px 4px 24px;border-bottom:1px solid rgba(28,26,22,.14)\"><p style=\"margin:0;font-size:16px;line-height:1.65;color:rgba(28,26,22,.72);max-width:640px\">Our fixed-price guarantee means the quote holds. Costs only change if you request a change — and we'll always get your written sign-off before anything moves.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div sc-camel-on-click=\"{{ tf5 }}\" style=\"cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:24px 4px;border-bottom:1px solid rgba(28,26,22,.14);transition:background .2s\" style-hover=\"background:rgba(255,90,36,.07)\"><span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;text-transform:uppercase\">Do you offer a warranty?<\u002Fspan><span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;color:#ff5a24\">{{ sign5 }}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:{{ open5 }};padding:6px 4px 24px;border-bottom:1px solid rgba(28,26,22,.14)\"><p style=\"margin:0;font-size:16px;line-height:1.65;color:rgba(28,26,22,.72);max-width:640px\">Every build comes with a written workmanship warranty, on top of manufacturer warranties for materials and fixtures. If something's not right, we come back and fix it.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"text-align:center;margin-top:48px\">\n      <div sc-camel-on-click=\"{{ scrollToForm }}\" style=\"cursor:pointer;display:inline-flex;align-items:center;gap:10px;background:#ff5a24;color:#16130d;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:18px;padding:18px 34px;transition:background .2s\" style-hover=\"background:#e64a17\">Still have questions? Get your free quote →<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= PRE-FOOTER CTA ================= -->\n<section style=\"background:#ff5a24;padding:26px 60px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap\">\n  <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:26px;text-transform:uppercase;color:#16130d\">Ready when you are — quotes are free.<\u002Fdiv>\n  <div sc-camel-on-click=\"{{ scrollToForm }}\" style=\"cursor:pointer;background:#16130d;color:#f5f2ec;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:16px;padding:15px 28px;transition:background .2s\" style-hover=\"background:#000000\">Get my free quote →<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================= FOOTER ================= -->\n<footer style=\"background:#e7e2d7;padding:64px 60px 40px;border-top:1px solid rgba(28,26,22,.1)\">\n  <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:40px;margin-bottom:48px\">\n    <div>\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n        <div style=\"width:32px;height:32px;background:#ff5a24;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:900;color:#16130d;font-size:19px\">N<\u002Fdiv>\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;color:#16130d\">NORTHFORGE<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0;font-size:15px;line-height:1.6;color:rgba(28,26,22,.55);max-width:300px\">Residential &amp; commercial construction done right the first time. Licensed, insured, and on time — for 20 years.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;color:rgba(28,26,22,.5);margin-bottom:16px\">EXPLORE<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;font-size:15px\"><a href=\"#services\" style=\"color:rgba(28,26,22,.75)\">Services<\u002Fa><a href=\"#process\" style=\"color:rgba(28,26,22,.75)\">Process<\u002Fa><a href=\"#gallery\" style=\"color:rgba(28,26,22,.75)\">Projects<\u002Fa><a href=\"#reviews\" style=\"color:rgba(28,26,22,.75)\">Reviews<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;color:rgba(28,26,22,.5);margin-bottom:16px\">CONTACT<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;font-size:15px;color:rgba(28,26,22,.75)\"><span>(555) 018-2200<\u002Fspan><span>build@northforge.co<\u002Fspan><span>1420 Kiln Road, Unit 7<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;color:rgba(28,26,22,.5);margin-bottom:16px\">CREDENTIALS<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;font-family:'Space Mono',monospace;font-size:12px;color:rgba(28,26,22,.6)\"><span>LIC #CB-408817<\u002Fspan><span>BONDED &amp; INSURED<\u002Fspan><span>EPA · OSHA<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-top:1px solid rgba(28,26,22,.1);padding-top:24px;font-size:13px;color:rgba(28,26,22,.45)\">\n    <span>© 2026 Northforge Build Co. All rights reserved.<\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;letter-spacing:.08em\">BUILT RIGHT · THE FIRST TIME<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<sc-if value=\"{{ showBar }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:fixed;bottom:0;left:0;right:0;z-index:80;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:12px 48px;background:#16130d;border-top:2px solid #ff5a24;box-shadow:0 -8px 24px rgba(0,0,0,.18)\">\n  <div style=\"display:flex;align-items:center;gap:16px;font-size:14px;flex-wrap:wrap\">\n    <span style=\"color:#ff5a24;font-weight:700\">4.9★<\u002Fspan><span style=\"color:rgba(245,242,236,.75)\">147 Google reviews<\u002Fspan>\n    <span style=\"color:rgba(245,242,236,.3)\">|<\u002Fspan>\n    <span style=\"color:rgba(245,242,236,.75)\">Free quote · response in 1 business day<\u002Fspan>\n  <\u002Fdiv>\n  <div sc-camel-on-click=\"{{ scrollToForm }}\" style=\"cursor:pointer;white-space:nowrap;background:#ff5a24;color:#16130d;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:15px;padding:12px 24px;transition:background .2s\" style-hover=\"background:#e64a17\">Get my free quote →<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { name:'', email:'', ptype:'', msg:'', submitted:false, showBar:false, formError:'', faq:[false,false,false,false,false,false] };\n\n  componentDidMount(){\n    // #6 — sticky CTA bar: show past hero, hide while quote form is on screen\n    this._onScroll = () => {\n      const q = document.getElementById('quote');\n      let show = window.scrollY > 650;\n      if (q) { const r = q.getBoundingClientRect(); if (r.top < window.innerHeight && r.bottom > 120) show = false; }\n      if (show !== this.state.showBar) this.setState({ showBar: show });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive:true });\n    // #5a — fade-up reveal on sections as they enter the viewport\n    const secs = Array.from(document.querySelectorAll('section')).slice(1);\n    secs.forEach(s=>{ s.style.opacity='0'; s.style.transform='translateY(26px)'; s.style.transition='opacity .7s ease, transform .7s ease'; });\n    const io = new IntersectionObserver(entries=>{\n      entries.forEach(en=>{ if(en.isIntersecting){ en.target.style.opacity='1'; en.target.style.transform='translateY(0)'; io.unobserve(en.target); } });\n    },{ threshold:.08, rootMargin:'0px 0px -8% 0px' });\n    secs.forEach(s=>io.observe(s));\n    // #5b — count-up on hero stats\n    document.querySelectorAll('[data-count]').forEach(el=>{\n      const target=parseFloat(el.getAttribute('data-count'));\n      const dec=parseInt(el.getAttribute('data-decimals')||'0',10);\n      const suf=el.getAttribute('data-suffix')||'';\n      const t0=performance.now(), dur=1400;\n      const tick=t=>{\n        const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);\n        el.textContent=(target*e).toFixed(dec)+suf;\n        if(p<1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    });\n  }\n\n  toggleFaq(i){ this.setState(s => { const f = s.faq.slice(); f[i] = !f[i]; return { faq:f }; }); }\n\n  scrollToForm(){\n    const el = document.getElementById('quote');\n    if(el) window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 60, behavior:'smooth' });\n  }\n\n  renderVals(){\n    const v = {\n      name:this.state.name, email:this.state.email, ptype:this.state.ptype, msg:this.state.msg,\n      submitted:this.state.submitted, notSubmitted:!this.state.submitted,\n      setName:e=>this.setState({name:e.target.value}),\n      setEmail:e=>this.setState({email:e.target.value}),\n      setPtype:e=>this.setState({ptype:e.target.value}),\n      setMsg:e=>this.setState({msg:e.target.value}),\n      submit:e=>{\n        e.preventDefault();\n        const {name,email,ptype}=this.state;\n        let err='';\n        if(!name.trim()) err='Please enter your name.';\n        else if(!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(email)) err='Please enter a valid email address.';\n        else if(!ptype) err='Please select a project type.';\n        if(err){ this.setState({formError:err}); return; }\n        this.setState({submitted:true, formError:''});\n      },\n      showBar:this.state.showBar,\n      formError:this.state.formError,\n      hasError:!!this.state.formError,\n      scrollToForm:()=>this.scrollToForm()\n    };\n    this.state.faq.forEach((o,i)=>{ v['open'+i]=o?'block':'none'; v['sign'+i]=o?'–':'+'; v['tf'+i]=()=>this.toggleFaq(i); });\n    return v;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
